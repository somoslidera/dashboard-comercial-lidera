<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar · Lidera</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--bg-0:#0A1322;--bg-1:#0E1B30;--surface:#13233F;--line:rgba(255,255,255,.07);--line-strong:rgba(255,255,255,.13);
    --text:#EAF0FA;--text-2:#9DB0CE;--text-3:#66799A;--gold:#CBA75E;--gold-soft:#E6D19A;--danger:#E8836B}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:radial-gradient(90vw 65vh at 50% -18%, #16294a 0%, var(--bg-1) 45%, var(--bg-0) 100%);
    color:var(--text);font-family:'Figtree',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:420px;background:linear-gradient(180deg,var(--surface),var(--bg-1));
    border:1px solid var(--line-strong);border-radius:22px;padding:clamp(28px,5vw,46px);
    box-shadow:0 24px 70px rgba(0,0,0,.5);position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .logo{width:56px;height:56px;border-radius:15px;background:linear-gradient(145deg,var(--gold-soft),var(--gold));
    display:grid;place-items:center;color:#1b1300;font-family:'Fraunces';font-weight:700;font-size:30px;
    box-shadow:0 10px 30px rgba(203,167,94,.3);margin-bottom:20px}
  .overline{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3em;color:var(--gold)}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:26px;margin:4px 0 4px}
  .sub{color:var(--text-2);font-size:14px;margin-bottom:26px}
  label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-2);margin:0 0 7px}
  input{width:100%;background:rgba(0,0,0,.28);border:1px solid var(--line-strong);border-radius:11px;
    color:var(--text);font-family:'Figtree';font-size:16px;padding:.85em 1em;outline:none;transition:border-color .2s;margin-bottom:16px}
  input:focus{border-color:var(--gold)}
  button{width:100%;font-family:'Figtree';font-size:17px;font-weight:700;color:#0A1322;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));border:none;border-radius:100px;
    padding:.85em;cursor:pointer;transition:transform .15s;margin-top:6px}
  button:hover{transform:translateY(-1px)}
  button:disabled{opacity:.6;cursor:default;transform:none}
  .erro{color:var(--danger);font-size:14px;font-weight:600;min-height:20px;margin-top:14px;text-align:center}
</style>
</head>
<body>
  <form class="card" id="form">
    <div class="logo">L</div>
    <div class="overline">Lidera Soluções</div>
    <h1>Acessar painel</h1>
    <div class="sub">Entre para ver os dashboards Comercial e de Marketing.</div>

    <label for="usuario">Usuário</label>
    <input id="usuario" name="usuario" type="text" autocomplete="username" value="lidera" required />

    <label for="senha">Senha</label>
    <input id="senha" name="senha" type="password" autocomplete="current-password" required autofocus />

    <button id="btn" type="submit">Entrar</button>
    <div class="erro" id="erro"></div>
  </form>

<script>
  const form = document.getElementById('form');
  const erro = document.getElementById('erro');
  const btn = document.getElementById('btn');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    erro.textContent = '';
    btn.disabled = true; btn.textContent = 'Entrando…';
    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario: document.getElementById('usuario').value, senha: document.getElementById('senha').value })
      });
      if (r.ok) { location.href = '/'; return; }
      const j = await r.json().catch(() => ({}));
      erro.textContent = j.erro || 'Não foi possível entrar.';
    } catch (_) {
      erro.textContent = 'Falha de conexão. Tente de novo.';
    }
    btn.disabled = false; btn.textContent = 'Entrar';
  });
</script>
</body>
</html>
