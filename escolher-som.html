<script>
let atual=null;
function tocar(btn,id){
  document.querySelectorAll('.op').forEach(o=>o.classList.remove('playing'));
  if(atual){atual.pause();atual.currentTime=0;}
  const a=document.getElementById('a'+id); a.currentTime=0; a.play(); atual=a;

}
